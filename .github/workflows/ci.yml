name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitmind-ai
    env:
      # Dummy values so build/type steps that touch config don't warn or fail.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/fitmind?schema=public"
      BETTER_AUTH_SECRET: "ci-dummy-secret-please-override-in-prod"
      BETTER_AUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitmind-ai/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
